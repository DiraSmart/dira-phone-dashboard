# =============================================================================
# AGREGAR A configuration.yaml DEL CLIENTE
# =============================================================================

# 1. Tema: copiar themes/dira-glass.yaml a /config/themes/dira-glass.yaml
frontend:
  themes: !include_dir_merge_named themes

# 2. Dashboard: copiar toda la carpeta dira-phone-dashboard/ a /config/dashboards/dira-phone/
lovelace:
  mode: yaml
  resources:
    # === HACS Custom Cards (instalar via HACS primero) ===
    - url: /hacsfiles/button-card/button-card.js
      type: module
    - url: /hacsfiles/lovelace-mushroom/mushroom.js
      type: module
    - url: /hacsfiles/bubble-card/bubble-card.js
      type: module
    - url: /hacsfiles/lovelace-card-mod/card-mod.js
      type: module
    - url: /hacsfiles/decluttering-card/decluttering-card.js
      type: module
    - url: /hacsfiles/lovelace-auto-entities/auto-entities.js
      type: module
    - url: /hacsfiles/stack-in-card/stack-in-card.js
      type: module
    - url: /hacsfiles/mini-media-player/mini-media-player-bundle.js
      type: module
    - url: /hacsfiles/swipe-navigation/swipe-navigation.js
      type: module
    - url: /hacsfiles/dira-thermostat/dira-thermostat.js
      type: module
    - url: /hacsfiles/lovelace-layout-card/layout-card.js
      type: module
    - url: /hacsfiles/mediocre-media-player-card/mediocre-media-player-card.js
      type: module

  # Si quieres multiples dashboards, usa esta estructura:
  # dashboards:
  #   dira-phone:
  #     mode: yaml
  #     filename: dashboards/dira-phone/dashboard.yaml
  #     title: Dira Phone
  #     icon: mdi:cellphone
  #     show_in_sidebar: true
