title: Moishy Mushka
path: cuarto-ninos
icon: phu:monzo
type: custom:vertical-layout
cards:
  # ---- Room Title ----
  - type: custom:decluttering-card
    template: room_title
    variables:
      - title: Moishy Mushka
      - icon: phu:monzo
      - back_url: /dira-dashboard

  # ---- Aire Acondicionado ----
  - type: custom:decluttering-card
    template: aire_section
    variables:
      - climate_entity: climate.ac_cuarto_ninos
      - thermostat_name: Aire Cuarto Ninos
      - popup: "true"

  # ---- Luces (auto-discovery por area) ----
  - type: custom:button-card
    template: section_header
    variables:
      section_icon: "mdi:lightbulb-group"
      section_title: "Luces"

  - type: custom:decluttering-card
    template: auto_lights_grid
    variables:
      - area_name: "Cuarto Ninos"
