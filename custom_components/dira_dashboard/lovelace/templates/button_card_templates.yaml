# =============================================================================
# card_room: Tarjeta de habitacion - Diseno moderno con color accent por room
# Cada room tiene su propio color, icono en circulo, gradiente visible
# =============================================================================
card_room:
  variables:
    room_name: "Room"
    room_icon: "mdi:home-outline"
    room_navigate: "/dira-dashboard/sala"
    room_color: "77, 208, 225"
    room_climate: "none"
    room_temp: "none"
    room_humidity: "none"
    room_lights: "none"
    room_media: "none"
    room_media_icon: "mdi:cast-audio"
  triggers_update:
    - "[[[ return variables.room_climate ]]]"
    - "[[[ return variables.room_lights ]]]"
    - "[[[ return variables.room_temp ]]]"
    - "[[[ return variables.room_humidity ]]]"
    - "[[[ return variables.room_media ]]]"
  entity: "[[[ return variables.room_climate !== 'none' ? variables.room_climate : (variables.room_temp !== 'none' ? variables.room_temp : undefined) ]]]"
  tap_action:
    action: navigate
    navigation_path: "[[[ return variables.room_navigate ]]]"
  show_icon: false
  show_name: false
  show_state: false
  aspect_ratio: 1.2/1
  styles:
    card:
      - background: >
          [[[
            const c = variables.room_color;
            let active = false;
            if (variables.room_climate !== 'none') {
              let ac = states[variables.room_climate];
              if (ac && ac.state !== 'off' && ac.state !== 'unavailable') active = true;
            }
            if (variables.room_lights !== 'none') {
              let lc = states[variables.room_lights];
              if (lc && parseInt(lc.state) > 0) active = true;
            }
            return active
              ? `linear-gradient(145deg, rgba(${c}, 0.18) 0%, rgba(${c}, 0.04) 50%, rgba(12, 12, 20, 0.95) 100%)`
              : `linear-gradient(145deg, rgba(${c}, 0.06) 0%, rgba(20, 20, 30, 0.95) 100%)`;
          ]]]
      - border: >
          [[[
            const c = variables.room_color;
            let active = false;
            if (variables.room_climate !== 'none') {
              let ac = states[variables.room_climate];
              if (ac && ac.state !== 'off' && ac.state !== 'unavailable') active = true;
            }
            if (variables.room_lights !== 'none') {
              let lc = states[variables.room_lights];
              if (lc && parseInt(lc.state) > 0) active = true;
            }
            return active
              ? `1px solid rgba(${c}, 0.3)`
              : `1px solid rgba(255, 255, 255, 0.06)`;
          ]]]
      - border-radius: "20px"
      - padding: "0"
      - overflow: "hidden"
      - box-shadow: >
          [[[
            const c = variables.room_color;
            let active = false;
            if (variables.room_climate !== 'none') {
              let ac = states[variables.room_climate];
              if (ac && ac.state !== 'off' && ac.state !== 'unavailable') active = true;
            }
            if (variables.room_lights !== 'none') {
              let lc = states[variables.room_lights];
              if (lc && parseInt(lc.state) > 0) active = true;
            }
            return active
              ? `0 0 30px rgba(${c}, 0.15), 0 8px 32px rgba(0,0,0,0.4)`
              : `0 4px 20px rgba(0,0,0,0.3)`;
          ]]]
      - transition: "all 0.4s cubic-bezier(0.4, 0, 0.2, 1)"
    grid:
      - position: relative
      - grid-template-areas: '"content"'
      - grid-template-columns: 1fr
      - grid-template-rows: 1fr
    custom_fields:
      content:
        - padding: "16px"
        - display: flex
        - flex-direction: column
        - justify-content: space-between
        - height: 100%
  custom_fields:
    content: |
      [[[
        const c = variables.room_color;

        // --- Determine states ---
        let acActive = false;
        let acState = 'off';
        let acTemp = '';
        if (variables.room_climate !== 'none' && states[variables.room_climate]) {
          const climate = states[variables.room_climate];
          acState = climate.state;
          acTemp = climate.attributes.temperature || '';
          if (acState !== 'off' && acState !== 'unavailable') acActive = true;
        }

        let tempVal = '';
        if (variables.room_temp !== 'none' && states[variables.room_temp]) {
          const t = states[variables.room_temp].state;
          if (t !== 'unavailable') tempVal = Math.round(parseFloat(t));
        }

        let humVal = '';
        if (variables.room_humidity !== 'none' && states[variables.room_humidity]) {
          humVal = Math.round(parseFloat(states[variables.room_humidity].state));
        }

        let lightsOn = 0;
        if (variables.room_lights !== 'none' && states[variables.room_lights]) {
          lightsOn = parseInt(states[variables.room_lights].state) || 0;
        }

        let mediaActive = false;
        if (variables.room_media !== 'none' && states[variables.room_media]) {
          const ms = states[variables.room_media].state;
          if (ms === 'on' || ms === 'playing') mediaActive = true;
        }

        // --- Mode display ---
        const modeMap = { heat_cool: 'Auto', fan_only: 'Fan', cool: 'Cool', heat: 'Heat', dry: 'Dry' };
        const modeDisplay = modeMap[acState] || acState;

        // --- Build HTML ---
        let html = `
          <div style="display: flex; flex-direction: column; gap: 10px; height: 100%;">

            <!-- Top row: icon circle + badges -->
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
              <div style="
                width: 48px; height: 48px;
                border-radius: 14px;
                background: ${acActive || lightsOn > 0
                  ? `linear-gradient(135deg, rgba(${c}, 0.3), rgba(${c}, 0.1))`
                  : `rgba(255, 255, 255, 0.06)`};
                display: flex; align-items: center; justify-content: center;
                box-shadow: ${acActive || lightsOn > 0
                  ? `0 0 20px rgba(${c}, 0.25), inset 0 1px 0 rgba(255,255,255,0.1)`
                  : `inset 0 1px 0 rgba(255,255,255,0.05)`};
                transition: all 0.3s ease;
              ">
                <ha-icon icon="${variables.room_icon}" style="
                  --mdc-icon-size: 24px;
                  color: rgb(${c});
                  filter: ${acActive || lightsOn > 0 ? `drop-shadow(0 0 6px rgba(${c}, 0.6))` : 'none'};
                "></ha-icon>
              </div>

              <!-- Badges -->
              <div style="display: flex; gap: 6px; align-items: center;">
                ${lightsOn > 0 ? `
                  <div style="
                    display: flex; align-items: center; gap: 3px;
                    background: rgba(255, 193, 7, 0.12);
                    border: 1px solid rgba(255, 193, 7, 0.25);
                    border-radius: 10px; padding: 3px 8px;
                  ">
                    <ha-icon icon="mdi:lightbulb" style="--mdc-icon-size: 13px; color: #ffc107;"></ha-icon>
                    <span style="font-size: 11px; font-weight: 600; color: #ffc107;">${lightsOn}</span>
                  </div>
                ` : ''}
                ${mediaActive ? `
                  <div style="
                    background: rgba(${c}, 0.12);
                    border: 1px solid rgba(${c}, 0.25);
                    border-radius: 10px; padding: 3px 6px;
                  ">
                    <ha-icon icon="${variables.room_media_icon}" style="--mdc-icon-size: 13px; color: rgb(${c});"></ha-icon>
                  </div>
                ` : ''}
              </div>
            </div>

            <!-- Room name -->
            <div style="flex: 1; display: flex; align-items: flex-end;">
              <span style="
                font-size: 16px; font-weight: 700;
                color: rgba(255, 255, 255, 0.93);
                letter-spacing: 0.01em;
                line-height: 1.2;
              ">${variables.room_name}</span>
            </div>

            <!-- Status bar: AC + Temp -->
            <div style="display: flex; flex-direction: column; gap: 4px;">
              ${variables.room_climate !== 'none' ? `
                <div style="display: flex; align-items: center; gap: 6px;">
                  <div style="
                    width: 6px; height: 6px; border-radius: 50%;
                    background: ${acActive ? `rgb(${c})` : 'rgba(255,255,255,0.15)'};
                    box-shadow: ${acActive ? `0 0 8px rgba(${c}, 0.6)` : 'none'};
                  "></div>
                  <span style="
                    font-size: 12px; font-weight: 500;
                    color: ${acActive ? `rgba(${c}, 0.9)` : 'rgba(255,255,255,0.3)'};
                    text-transform: capitalize;
                  ">${acActive ? `${modeDisplay} ${acTemp}°` : 'Off'}</span>
                </div>
              ` : ''}
              ${tempVal ? `
                <div style="display: flex; align-items: center; gap: 6px;">
                  <span style="font-size: 11px; color: rgba(255,255,255,0.35);">
                    ${tempVal}° ${humVal ? `· ${humVal}%` : ''}
                  </span>
                </div>
              ` : ''}
            </div>

            <!-- Bottom accent line -->
            <div style="
              height: 3px; border-radius: 2px; margin-top: 2px;
              background: ${acActive || lightsOn > 0
                ? `linear-gradient(90deg, rgba(${c}, 0.6), rgba(${c}, 0.1))`
                : `rgba(255, 255, 255, 0.04)`};
              transition: all 0.4s ease;
            "></div>
          </div>
        `;
        return html;
      ]]]

# =============================================================================
# section_header: Separador de seccion moderno
# =============================================================================
section_header:
  variables:
    section_icon: "mdi:lightbulb-group"
    section_title: "Section"
  show_icon: true
  show_name: true
  show_state: false
  icon: "[[[ return variables.section_icon ]]]"
  name: "[[[ return variables.section_title ]]]"
  tap_action:
    action: none
  styles:
    card:
      - background: "transparent"
      - border: "none"
      - border-radius: "0"
      - padding: "4px 4px"
      - box-shadow: "none"
      - margin-top: "8px"
    icon:
      - color: "#4dd0e1"
      - width: "20px"
      - opacity: "0.7"
    name:
      - font-size: "12px"
      - font-weight: "700"
      - color: "rgba(255, 255, 255, 0.45)"
      - text-transform: "uppercase"
      - letter-spacing: "0.12em"
    grid:
      - grid-template-areas: "'i n'"
      - grid-template-columns: "min-content auto"
      - grid-gap: "8px"

# =============================================================================
# tv_button: Boton del control remoto TV
# =============================================================================
tv_button:
  variables:
    btn_icon: "mdi:power"
    btn_command: "power"
    btn_service: "script.remote_tv_samsung"
    btn_lugar: "principal"
    btn_color: "rgba(255, 255, 255, 0.7)"
  show_icon: true
  show_name: false
  icon: "[[[ return variables.btn_icon ]]]"
  tap_action:
    action: call-service
    service: "[[[ return variables.btn_service ]]]"
    service_data:
      command: "[[[ return variables.btn_command ]]]"
      lugar: "[[[ return variables.btn_lugar ]]]"
  styles:
    card:
      - background: "rgba(255, 255, 255, 0.04)"
      - border: "1px solid rgba(255, 255, 255, 0.06)"
      - border-radius: "14px"
      - box-shadow: "none"
      - height: "55px"
    icon:
      - color: "[[[ return variables.btn_color ]]]"
      - width: "24px"

# =============================================================================
# appliance_status: Estado de electrodomestico (lavadora/secadora)
# =============================================================================
appliance_status:
  variables:
    app_entity: "sensor.state_lavadora"
    app_name: "Lavadora"
    app_icon_off: "mdi:washing-machine-off"
    app_icon_on: "mdi:washing-machine"
    app_active_state: "washing"
  entity: "[[[ return variables.app_entity ]]]"
  show_icon: true
  show_name: true
  show_state: true
  name: "[[[ return variables.app_name ]]]"
  icon: |
    [[[
      const s = entity ? entity.state : 'off';
      return s === variables.app_active_state ? variables.app_icon_on : variables.app_icon_off;
    ]]]
  styles:
    card:
      - background: "rgba(255, 255, 255, 0.03)"
      - border: "1px solid rgba(255, 255, 255, 0.05)"
      - border-radius: "16px"
      - box-shadow: "none"
      - height: "100px"
    icon:
      - color: |
          [[[
            const s = entity ? entity.state : 'off';
            if (s === variables.app_active_state) return '#ffc107';
            if (s === 'standby') return 'rgba(255,255,255,0.4)';
            return 'rgba(255,255,255,0.15)';
          ]]]
      - animation: |
          [[[
            return entity && entity.state === variables.app_active_state
              ? 'blink 2s ease infinite' : 'none';
          ]]]
    name:
      - font-size: "13px"
    state:
      - font-size: "13px"
      - text-transform: "capitalize"
